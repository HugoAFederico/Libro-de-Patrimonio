<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Prueba AR</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
    a-scene { width: 100vw; height: 100vh; }

    #instrucciones {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      z-index: 100;
      font-family: sans-serif;
      font-size: 14px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 12px;
    }

    #instrucciones a {
      color: #f0c060;
    }
  </style>
</head>
<body>

  <!--
    Esta es una prueba con la imagen oficial de MindAR.
    Si la cámara funciona acá, el problema era tu archivo .mind.
    Si no funciona acá tampoco, el problema es el navegador o el celular.

    Imagen de prueba para imprimir o mostrar en pantalla:
    https://hiukim.github.io/mind-ar-js/examples/assets/card-example/card.png
  -->

  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/examples/assets/card-example/targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <img id="card" src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/examples/assets/card-example/card.png" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane
        src="#card"
        position="0 0 0"
        height="0.552"
        width="1"
        rotation="0 0 0"
      ></a-plane>
    </a-entity>

  </a-scene>

  <div id="instrucciones">
    📷 Si ves la cámara — ¡funciona! Apuntá a esta imagen de prueba:<br>
    <a href="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/examples/assets/card-example/card.png" target="_blank">
      Tocar aquí para ver la imagen de prueba
    </a>
  </div>

</body>
</html>
